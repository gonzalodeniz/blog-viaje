# TLS, cabeceras de seguridad (RNF-R1-03/04) y rate limiting de /api/auth
# se añaden en una tarea posterior de WP-R1-1: en este esqueleto solo se
# sirve HTTP para desarrollo local.

server {
    listen 80;
    server_name _;

    location /healthz {
        proxy_pass http://backend:8000/healthz;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root   /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
