# Implementa: RNF-R1-07 (usuario no root ya en los Dockerfiles; aquí, FS de solo lectura)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ../backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS}
      SESSION_REMEMBER_DAYS: ${SESSION_REMEMBER_DAYS}
      SESSION_ABSOLUTE_MAX_DAYS: ${SESSION_ABSOLUTE_MAX_DAYS}
      LOGIN_ATTEMPTS_RETENTION_DAYS: ${LOGIN_ATTEMPTS_RETENTION_DAYS}
      MEDIA_ROOT: /app/media
      PYTHONDONTWRITEBYTECODE: "1"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    environment:
      BITACORA_DOMAIN: ${BITACORA_DOMAIN}
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
      - /etc/nginx/conf.d
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done'
    networks:
      - internal

volumes:
  pgdata:
  media:
  letsencrypt:
  certbot-webroot:

networks:
  internal:
