name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend — tests, cobertura y seguridad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar backend[dev]
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest (cobertura ≥ 80 % líneas y ramas, bloqueante)
        working-directory: backend
        run: pytest

      - name: bandit (SAST)
        working-directory: backend
        run: bandit -r app -ll

      - name: pip-audit (dependencias)
        working-directory: backend
        run: pip-audit --skip-editable

  frontend:
    name: Frontend — lint, tests, cobertura y seguridad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: oxlint
        working-directory: frontend
        run: npm run lint

      - name: vitest (cobertura ≥ 80 % líneas y ramas, bloqueante)
        working-directory: frontend
        run: npx vitest run --coverage

      - name: npm audit (dependencias)
        working-directory: frontend
        run: npm audit --audit-level=high

  meta-tests:
    name: Tests meta (CI, trazabilidad)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar pytest
        run: pip install pytest

      - name: pytest tests/meta
        run: pytest

  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar semgrep
        run: pip install semgrep

      - name: semgrep scan
        run: semgrep scan --config auto --error --metrics=off

  gitleaks:
    name: gitleaks (secretos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks detect
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --no-git -v

  trivy:
    name: trivy (dependencias y configuración)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: trivy fs scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  traceability:
    name: Trazabilidad SDD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: traceability.py --check --release R1
        run: python tools/traceability.py --check --release R1
